<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wiom – NetBox Pickup Date</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(79, 70, 229, 0.12);
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand-name {
      font-size: 26px;
      font-weight: 900;
      color: #4f46e5;
      letter-spacing: -1px;
    }
    .brand-sub {
      font-size: 11px;
      font-weight: 600;
      color: #a5b4fc;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    h1 {
      font-size: 19px;
      font-weight: 800;
      color: #1e1b4b;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13.5px;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .field-wrap { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .customer-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f5f3ff;
      border: 1.5px solid #ddd6fe;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }
    .customer-avatar {
      width: 42px; height: 42px;
      background: #4f46e5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .customer-info-name {
      font-size: 15px;
      font-weight: 700;
      color: #1e1b4b;
    }
    .customer-info-phone {
      font-size: 13px;
      color: #6b7280;
      margin-top: 2px;
    }

input[type="date"] {
      width: 100%;
      padding: 15px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 16px;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    input[type="date"]:focus {
      border-color: #4f46e5;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .info-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 24px;
    }
    .info-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .info-text { font-size: 12.5px; color: #166534; line-height: 1.5; }

    .submit-btn {
      width: 100%;
      padding: 17px 16px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
      letter-spacing: 0.01em;
    }
    .submit-btn:hover  { background: #4338ca; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
      background: #a5b4fc;
      box-shadow: none;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      color: #dc2626;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
    }

    /* ── Confirmation ── */
    .confirmation { display: none; text-align: center; }
    .check-wrap {
      width: 80px; height: 80px;
      background: #f0fdf4;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }
    .confirmation h2 {
      font-size: 17px;
      font-weight: 700;
      color: #1e1b4b;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .confirmed-date {
      display: inline-block;
      background: #ede9fe;
      color: #4f46e5;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 50px;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-name">wiom</div>
    <div class="brand-sub">NetBox Pickup</div>
  </div>

  <!-- ── Form ── -->
  <div id="form-section">
    <h1>Apni Pickup Date Chuniye</h1>
    <p class="subtitle">Woh tarikh select karein jab aap ghar par hoon aur hum NetBox le sakein</p>

    <form id="pickup-form" novalidate>
      <input type="hidden" id="field-name"  name="name">
      <input type="hidden" id="field-phone" name="phone">

      <div class="customer-card">
        <div class="customer-avatar">👤</div>
        <div>
          <div class="customer-info-name" id="display-name"></div>
          <div class="customer-info-phone" id="display-phone"></div>
        </div>
      </div>

      <div class="field-wrap">
        <label for="pickup-date">Pickup Ki Tarikh</label>
        <input type="date" id="pickup-date" name="pickup-date" required>
      </div>

<button type="submit" class="submit-btn" id="submit-btn">
        Taareekh Confirm Karein
      </button>
      <div class="error-msg" id="error-msg">
        Kuch gadbad hui. Dobara try karein ya support se contact karein.
      </div>
    </form>
  </div>

  <!-- ── Confirmation ── -->
  <div class="confirmation" id="confirmation">
    <div class="check-wrap">✅</div>
    <h2 id="confirmation-text"></h2>
    <div class="confirmed-date" id="confirmed-date"></div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9t4BHYI8a9EjWd3nWa2QYQJOIDuhQzpgWbDWpH6UCHEJRaBJ4oXeP6mz-Aa1LSQxh/exec';
  // ────────────────────────────────────────────────────────────────────────

  // Read query params
  var params = new URLSearchParams(window.location.search);
  var nameVal  = (params.get('name')  || 'Rahul Sharma').trim();
  var phoneVal = (params.get('phone') || '9876543210').trim();

  document.getElementById('field-name').value  = nameVal;
  document.getElementById('field-phone').value = phoneVal;

  document.getElementById('display-name').textContent  = nameVal;
  document.getElementById('display-phone').textContent = phoneVal;

  // Set minimum date = tomorrow
  var tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  var yyyy = tomorrow.getFullYear();
  var mm   = String(tomorrow.getMonth() + 1).padStart(2, '0');
  var dd   = String(tomorrow.getDate()).padStart(2, '0');
  var minDate = yyyy + '-' + mm + '-' + dd;

  var dateInput = document.getElementById('pickup-date');
  dateInput.min   = minDate;
  dateInput.value = minDate;

  // Form submit
  document.getElementById('pickup-form').addEventListener('submit', function (e) {
    e.preventDefault();

    var pickupDate = dateInput.value;
    if (!pickupDate || pickupDate < minDate) {
      dateInput.focus();
      return;
    }

    var nameVal  = document.getElementById('field-name').value.trim();
    var phoneVal = document.getElementById('field-phone').value.trim();

    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Bhej rahe hain...';
    document.getElementById('error-msg').style.display = 'none';

    var timestamp = new Date().toISOString();
    var body = new URLSearchParams({
      timestamp : timestamp,
      name      : nameVal,
      phone     : phoneVal,
      date      : pickupDate
    });

    fetch(SCRIPT_URL, {
      method  : 'POST',
      mode    : 'no-cors',
      headers : { 'Content-Type': 'application/x-www-form-urlencoded' },
      body    : body.toString()
    })
    .then(function () {
      showConfirmation(pickupDate);
    })
    .catch(function () {
      btn.disabled = false;
      btn.innerHTML = 'Taareekh Confirm Karein';
      document.getElementById('error-msg').style.display = 'block';
    });
  });

  function showConfirmation(pickupDate) {
    document.getElementById('form-section').style.display = 'none';

    var conf = document.getElementById('confirmation');
    conf.style.display = 'block';

    var displayName = nameVal || 'Aap';
    document.getElementById('confirmation-text').textContent =
      'Shukriya ' + displayName + '! Aapki taareekh note ho gayi. Hum usi din aayenge NetBox lene \u2705';

    // Format date nicely
    var parts = pickupDate.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
    document.getElementById('confirmed-date').textContent =
      days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }
</script>
</body>
</html>
