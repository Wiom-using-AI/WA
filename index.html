<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wiom – NetBox Pickup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F1EDF7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Header bar ── */
    .top-bar {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .wiom-logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .wiom-logo img {
      height: 32px;
      width: auto;
    }
    .wiom-logo-text {
      font-size: 26px;
      font-weight: 700;
      color: #D9008D;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    /* ── Card ── */
    .card {
      background: #FAF9FC;
      border-radius: 20px;
      padding: 28px 24px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(68, 49, 82, 0.10);
    }

    /* ── Hero section ── */
    .hero {
      margin-bottom: 24px;
    }
    .hero-tag {
      display: inline-block;
      background: #FFE5F6;
      color: #D9008D;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 50px;
      margin-bottom: 12px;
    }
    .hero h1 {
      font-size: 22px;
      font-weight: 800;
      color: #161021;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 14px;
      color: #665E75;
      line-height: 1.6;
    }

    /* ── Customer card ── */
    .customer-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1.5px solid #D7D3E0;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }
    .customer-avatar {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #D9008D, #443152);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .customer-info-name {
      font-size: 15px;
      font-weight: 700;
      color: #161021;
    }
    .customer-info-phone {
      font-size: 13px;
      color: #665E75;
      margin-top: 2px;
    }

    /* ── Field ── */
    .field-wrap { margin-bottom: 8px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #443152;
      margin-bottom: 8px;
    }

    input[type="date"] {
      width: 100%;
      padding: 15px 16px;
      border: 2px solid #D7D3E0;
      border-radius: 12px;
      font-size: 16px;
      color: #161021;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }
    input[type="date"]:focus {
      border-color: #D9008D;
      box-shadow: 0 0 0 4px #FFE5F6;
    }

    /* ── CTA Button ── */
    .submit-btn {
      width: 100%;
      padding: 17px 16px;
      background: #D9008D;
      color: #FAF9FC;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 24px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(217, 0, 141, 0.30);
      letter-spacing: 0.01em;
    }
    .submit-btn:hover  { background: #b8007a; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
      background: #FFB2E4;
      box-shadow: none;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      color: #E01E00;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
    }

    /* ── Confirmation ── */
    .confirmation { display: none; text-align: center; padding: 8px 0; }
    .check-wrap {
      width: 80px; height: 80px;
      background: #E1FAED;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 38px;
    }
    .confirmation h2 {
      font-size: 17px;
      font-weight: 700;
      color: #161021;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .confirmed-date {
      display: inline-block;
      background: #FFE5F6;
      color: #D9008D;
      font-size: 15px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 50px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #A7A1B2;
      text-align: center;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

    <div class="wiom-logo">

      <span class="wiom-logo-text">Wiom</span>
    </div>
  </div>

  <div class="card">

    <!-- ── Form ── -->
    <div id="form-section">
      <div class="hero">
        <div class="hero-tag">NetBox Pickup</div>
        <h1>NetBox वापसी की Date चुनें</h1>
        <p>घर पर हों उस दिन Date चुनें — हमारा Authorized Courier Boy आएगा NetBox लेने</p>
      </div>

      <form id="pickup-form" novalidate>
        <input type="hidden" id="field-name"  name="name">
        <input type="hidden" id="field-phone" name="phone">

        <div class="customer-card">
          <div class="customer-avatar">👤</div>
          <div>
            <div class="customer-info-name" id="display-name"></div>
            <div class="customer-info-phone" id="display-phone"></div>
          </div>
        </div>

        <div class="field-wrap">
          <label for="pickup-date">Date चुनें</label>
          <input type="date" id="pickup-date" name="pickup-date" required>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          Date पक्की करें
        </button>
        <div class="error-msg" id="error-msg">
          कुछ गड़बड़ हुई। दोबारा कोशिश करें।
        </div>
      </form>
    </div>

    <!-- ── Confirmation ── -->
    <div class="confirmation" id="confirmation">
      <div class="check-wrap">✅</div>
      <h2 id="confirmation-text"></h2>
      <div class="confirmed-date" id="confirmed-date"></div>
    </div>

  </div>

  <div class="footer">© Wiom · रिचार्ज-वाला घर का नेट</div>

<script>
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzbXNrjyagPYv6d3iHUPFyUaC4kwbA2LN5cdI3ZuCudzkiAIj5Pkk826gdADSn7g1aa/exec';

  var params   = new URLSearchParams(window.location.search);
  var nameVal  = (params.get('name')  || 'Rahul Sharma').trim();
  var phoneVal = (params.get('phone') || '9876543210').trim();

  document.getElementById('field-name').value  = nameVal;
  document.getElementById('field-phone').value = phoneVal;
  document.getElementById('display-name').textContent  = nameVal;
  document.getElementById('display-phone').textContent = phoneVal;

  var tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  var minDate = tomorrow.toISOString().split('T')[0];

  var dayAfter = new Date();
  dayAfter.setDate(dayAfter.getDate() + 2);
  var defaultDate = dayAfter.toISOString().split('T')[0];

  var dateInput = document.getElementById('pickup-date');
  dateInput.min   = minDate;
  dateInput.value = defaultDate;

  document.getElementById('pickup-form').addEventListener('submit', function (e) {
    e.preventDefault();

    var pickupDate = dateInput.value;
    if (!pickupDate || pickupDate < minDate) { dateInput.focus(); return; }

    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>भेज रहे हैं...';
    document.getElementById('error-msg').style.display = 'none';

    fetch(SCRIPT_URL, {
      method  : 'POST',
      mode    : 'no-cors',
      headers : { 'Content-Type': 'application/x-www-form-urlencoded' },
      body    : new URLSearchParams({
        timestamp : new Date().toISOString(),
        name      : nameVal,
        phone     : phoneVal,
        date      : pickupDate
      }).toString()
    })
    .then(function () { showConfirmation(pickupDate); })
    .catch(function () {
      btn.disabled = false;
      btn.innerHTML = 'तारीख पक्की करें';
      document.getElementById('error-msg').style.display = 'block';
    });
  });

  function showConfirmation(pickupDate) {
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('confirmation').style.display = 'block';

    document.getElementById('confirmation-text').textContent =
      'शुक्रिया ' + nameVal + '! आपकी Date नोट हो गई। हम उसी दिन आएंगे NetBox लेने ✅';

    var parts = pickupDate.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
    var days   = ['रविवार','सोमवार','मंगलवार','बुधवार','गुरुवार','शुक्रवार','शनिवार'];
    var months = ['जनवरी','फ़रवरी','मार्च','अप्रैल','मई','जून',
                  'जुलाई','अगस्त','सितंबर','अक्तूबर','नवंबर','दिसंबर'];
    document.getElementById('confirmed-date').textContent =
      days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }
</script>
</body>
